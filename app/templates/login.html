<!doctype html>
<html lang="vi" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Task Manager</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Script kiểm tra theme ngay lập tức -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
        })();
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Background thay đổi nhẹ theo theme */
            background: var(--bs-dark-border-subtle);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            transition: all 0.3s ease;
        }
        
        /* Khi ở chế độ tối, làm mờ background gradient một chút cho đỡ chói */
        [data-bs-theme="dark"] body {
            background: linear-gradient(135deg, #1a1c2c 0%, #4a148c 100%);
        }

        .login-card {
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
            padding: 1.8rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 350px;
            border: 1px solid var(--bs-border-color);
            transition: background-color 0.3s ease;
        }
        
        .login-card:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .icon-box {
            width: 55px;
            height: 55px;
            background: var(--bs-primary-border-subtle);
            color: #667eea;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.8rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            background-color: var(--bs-tertiary-bg);
            border: 1px solid var(--bs-border-color);
            color: var(--bs-body-color);
        }

        .form-control:focus {
            background-color: var(--bs-body-bg);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }

        .input-group-text {
            background-color: var(--bs-tertiary-bg);
            border: 1px solid var(--bs-border-color);
            color: var(--bs-secondary-color);
            border-radius: 12px 0 0 12px;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Nút đổi theme nhanh ở góc màn hình */
        .theme-floating-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<!-- Nút đổi theme nhanh -->
<div class="theme-floating-btn" id="darkModeToggle">
    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
</div>

<div class="login-card">
    <div class="text-center">
        <div class="icon-box">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h3 class="fw-bold">Chào mừng</h3>
        <p class="text-muted small mb-4">Đăng nhập để quản lý công việc</p>
    </div>

    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="mb-3">
            <label class="form-label small fw-bold">Tên đăng nhập</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input class="form-control" name="username" placeholder="Nhập username" required>
            </div>
        </div>
        
        <div class="mb-4">
            <label class="form-label small fw-bold">Mật khẩu</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-key"></i></span>
                <input class="form-control" type="password" name="password" placeholder="••••••••" required>
            </div>
        </div>

        <button class="btn btn-primary btn-login w-100 mb-3">Đăng nhập</button>
    </form>

    <div class="text-center mt-3">
        <p class="small text-muted mb-0">Chưa có tài khoản? 
            <a href="/register" class="text-primary fw-bold text-decoration-none">Đăng ký ngay</a>
        </p>
    </div>
</div>

<script>
    const themeToggle = document.getElementById('darkModeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const htmlElement = document.documentElement;

    const updateIcon = (theme) => {
        if (theme === 'dark') {
            themeIcon.classList.replace('bi-moon-stars-fill', 'bi-sun-fill');
        } else {
            themeIcon.classList.replace('bi-sun-fill', 'bi-moon-stars-fill');
        }
    }

    // Khởi tạo icon
    updateIcon(htmlElement.getAttribute('data-bs-theme'));

    themeToggle.addEventListener('click', () => {
        const currentTheme = htmlElement.getAttribute('data-bs-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        
        htmlElement.setAttribute('data-bs-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateIcon(newTheme);
    });
</script>

</body>
</html>
