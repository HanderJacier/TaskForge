<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>TaskForge | Sync & Edit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
  <script>
    // ✅ THIẾT LẬP THEME NGAY LẬP TỨC (Chống nháy trắng)
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      if (savedTheme === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
    
    // ✅ GET CSRF TOKEN
    const CSRF_TOKEN = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
  </script>
  <style>
    body { 
      transition: background-color 0.3s, color 0.3s; 
    }
    html.dark body { 
      background-color: #0f172a; 
    }
    .task-item { 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .task-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    html.dark .task-item:hover {
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-200 to-blue-200 dark:from-gray-900 dark:to-gray-800 text-gray-900 dark:text-gray-100 p-2 sm:p-4">
  <!-- Navigation - ✅ ĐÃ FIX -->
<nav class="fixed top-0 left-0 right-0 bg-white/80 dark:bg-gray-900/95 backdrop-blur-md shadow-lg border-b border-gray-200/50 dark:border-gray-700/50 p-2 z-40">
  <div class="max-w-3xl mx-auto flex justify-between items-center">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-md">
        <span class="font-bold text-white text-sm">TF</span>
      </div>
      <span class="font-bold text-xl bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">TaskForge</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeToggle" class="p-1.5 rounded-lg bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all duration-200 text-lg">
        <span id="themeIcon">🌙</span>
      </button>
      <span class="hidden sm:inline text-xs text-gray-500 dark:text-gray-400 font-medium">Xin chào!</span>
      <a href="/logout" class="px-3 py-1.5 bg-gradient-to-r from-red-500 to-red-600 text-white font-semibold rounded-lg shadow-md hover:shadow-lg hover:from-red-600 hover:to-red-700 transform hover:-translate-y-0.5 transition-all duration-200 text-sm">
        Đăng xuất
      </a>
    </div>
  </div>
</nav>

  <!-- Main Content -->
  <main class="pt-20 pb-8 max-w-lg mx-auto">
    <div class="bg-slate-100/80 dark:bg-gray-800/80 backdrop-blur-xl rounded-2xl shadow-xl p-6 border border-white/50 dark:border-gray-700/50">
      <!-- Header -->
      <div class="text-center mb-6">
        <h1 class="text-2xl sm:text-3xl font-black bg-gradient-to-r from-gray-900 to-gray-700 dark:from-blue-400 dark:to-purple-400 bg-clip-text text-transparent mb-2">
          Danh sách Tasks
        </h1>
        <p class="text-gray-600 dark:text-gray-400 text-sm max-w-md mx-auto">
          Quản lý công việc một cách thông minh và trực quan
        </p>
        <div class="flex justify-center mt-4">
          <div class="w-16 h-0.5 bg-gradient-to-r from-blue-500 to-purple-500 rounded-full"></div>
        </div>
      </div>

      <!-- ✅ Add Task Form (CHỈ INPUT + BUTTON - ĐÃ TÁCH RIÊNG) -->
      <div class="flex gap-2 mb-6">
        <div class="relative group flex-1">
          <input 
            id="taskInput" 
            placeholder="Nhập task mới..." 
            class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 dark:border-gray-600 bg-white/50 dark:bg-gray-700/50 backdrop-blur-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all duration-300 text-base placeholder-gray-500"
          >
          <div class="absolute inset-0 rounded-xl bg-gradient-to-r from-blue-500/5 to-purple-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"></div>
        </div>
        <button 
          id="addBtn" 
          class="bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white px-4 py-3 rounded-xl font-bold text-sm shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300 whitespace-nowrap flex-shrink-0"
        >
          Thêm
        </button>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-3 gap-3 mb-6 p-4 bg-gradient-to-r from-blue-100 to-purple-100 dark:from-blue-500/10 dark:to-purple-500/10 rounded-xl border-2 border-blue-200 dark:border-blue-500/30 shadow-sm">
        <div class="text-center p-2 bg-white dark:bg-gray-700/50 rounded-lg">
          <div class="text-2xl font-black text-blue-600 dark:text-blue-400" id="totalTasks">0</div>
          <div class="text-xs font-semibold text-gray-700 dark:text-gray-300">Tổng</div>
        </div>
        <div class="text-center p-2 bg-white dark:bg-gray-700/50 rounded-lg">
          <div class="text-2xl font-black text-green-600 dark:text-green-400" id="completedTasks">0</div>
          <div class="text-xs font-semibold text-gray-700 dark:text-gray-300">Hoàn thành</div>
        </div>
        <div class="text-center p-2 bg-white dark:bg-gray-700/50 rounded-lg">
          <div class="text-2xl font-black text-orange-600 dark:text-orange-400" id="pendingTasks">0</div>
          <div class="text-xs font-semibold text-gray-700 dark:text-gray-300">Còn lại</div>
        </div>
      </div>

      <!-- ✅ FILTER ĐƯỢC ĐƯA XUỐNG ĐÂY - GIỮA STATS VÀ TASK LIST -->
      <div class="mb-6 flex justify-end">
        <div class="max-w-48">
          <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">Lọc theo trạng thái:</label>
          <select id="statusFilter" class="w-full px-2 py-1 text-xs bg-white/70 dark:bg-gray-700/70 backdrop-blur-sm border-2 border-gray-200/50 dark:border-gray-600/50 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all appearance-none cursor-pointer">
            <option value="all">Tất cả</option>
            <option value="pending">Chờ làm</option>
            <option value="completed">Hoàn thành</option>
          </select>
        </div>
      </div>

      <!-- Task List -->
      <div class="space-y-2 max-h-80 overflow-y-auto pr-1" id="taskList">
        <!-- Tasks will be rendered here -->
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="text-center py-12 hidden">
        <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-r from-blue-100 to-purple-100 dark:from-blue-900/30 dark:to-purple-900/30 rounded-2xl flex items-center justify-center">
          <span class="text-2xl">📝</span>
        </div>
        <h3 class="text-xl font-bold text-gray-700 dark:text-gray-300 mb-2">Chưa có task nào!</h3>
        <p class="text-gray-500 dark:text-gray-400 text-sm mb-4">Hãy thêm task đầu tiên của bạn</p>
      </div>
    </div>
  </main>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
    <div class="bg-white dark:bg-gray-800 rounded-xl p-6 max-w-sm mx-4 shadow-xl">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100 mb-4">Xác nhận xóa</h3>
      <p class="text-gray-600 dark:text-gray-400 mb-6">Bạn có chắc muốn xóa task này?<br><span class="text-sm text-red-500">Hành động này không thể hoàn tác.</span></p>
      <div class="flex gap-3 justify-end">
        <button id="cancelDelete" class="px-4 py-2 text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">Hủy</button>
        <button id="confirmDelete" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">Xóa</button>
      </div>
    </div>
  </div>

  <script>
class TaskForge {
  constructor() {
    this.tasks = [];
    this.editingId = null;
    this.filter = 'all';
    this.deleteId = null;
    this.init();
  }

  async init() {
    await this.loadTasks();
    this.initTheme();
    this.bindEvents();
    this.updateStats();
    this.render();
  }

  async loadTasks() {
    try {
      const response = await fetch('/api/tasks');
      const data = await response.json();
      this.tasks = data.tasks || [];
    } catch (error) {
      console.error('Error loading tasks:', error);
      this.tasks = [];
    }
  }

  initTheme() {
    const themeIcon = document.getElementById('themeIcon');
    const isDark = document.documentElement.classList.contains('dark');
    themeIcon.textContent = isDark ? '☀️' : '🌙';
  }

  bindEvents() {
    // Theme toggle
    document.getElementById('themeToggle').addEventListener('click', () => {
      const html = document.documentElement;
      const themeIcon = document.getElementById('themeIcon');
      const isDark = html.classList.toggle('dark');
      themeIcon.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Add task
    document.getElementById('addBtn').addEventListener('click', () => this.addTask());
    document.getElementById('taskInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') this.addTask();
    });
    document.getElementById('addFirstTask')?.addEventListener('click', () => this.addTask());

    // Filter
    document.getElementById('statusFilter').addEventListener('change', (e) => {
      this.filter = e.target.value;
      this.render();
    });

    // Delete modal events
    document.getElementById('cancelDelete').addEventListener('click', () => this.hideDeleteModal());
    document.getElementById('confirmDelete').addEventListener('click', () => this.confirmDelete());

    // Close modal when clicking outside
    document.getElementById('deleteModal').addEventListener('click', (e) => {
      if (e.target.id === 'deleteModal') this.hideDeleteModal();
    });
  }

  getFilteredTasks() {
    switch (this.filter) {
      case 'pending':
        return this.tasks.filter(task => !task.done);
      case 'completed':
        return this.tasks.filter(task => task.done);
      default:
        return this.tasks;
    }
  }

  async addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text || text.length > 200) return;

    const formData = new FormData();
    formData.append('name', text);

    try {
      const response = await fetch('/add', {
        method: 'POST',
        headers: {
          'X-CSRFToken': CSRF_TOKEN
        },
        body: formData
      });
      if (response.ok) {
        input.value = '';
        input.focus();
        await this.loadTasks();
        this.updateStats();
        this.render();
      }
    } catch (error) {
      console.error('Error adding task:', error);
    }
  }

  async toggleTask(id) {
    try {
      const response = await fetch(`/toggle/${id}`);
      if (response.ok) {
        await this.loadTasks();
        this.updateStats();
        this.render();
      }
    } catch (error) {
      console.error('Error toggling task:', error);
    }
  }

  startEdit(id) {
    this.editingId = id;
    this.render();
    setTimeout(() => {
      const input = document.getElementById(`edit-input-${id}`);
      input?.focus();
      input?.select();
    }, 100);
  }

  async saveEdit(id) {
    const input = document.getElementById(`edit-input-${id}`);
    const task = this.tasks.find(t => t.id === id);
    if (task && input?.value.trim()) {
      const formData = new FormData();
      formData.append('name', input.value.trim());
      formData.append('status', task.done ? 'done' : 'pending');

      try {
        const response = await fetch(`/edit/${id}`, {
          method: 'POST',
          headers: {
            'X-CSRFToken': CSRF_TOKEN
          },
          body: formData
        });
        if (response.ok) {
          this.editingId = null;
          await this.loadTasks();
          this.updateStats();
          this.render();
        }
      } catch (error) {
        console.error('Error saving edit:', error);
      }
    }
  }

  cancelEdit() {
    this.editingId = null;
    this.render();
  }

  showDeleteModal(id) {
    this.deleteId = id;
    document.getElementById('deleteModal').classList.remove('hidden');
  }

  hideDeleteModal() {
    document.getElementById('deleteModal').classList.add('hidden');
    this.deleteId = null;
  }

  async confirmDelete() {
    if (this.deleteId) {
      try {
        const response = await fetch(`/delete/${this.deleteId}`);
        if (response.ok) {
          await this.loadTasks();
          this.updateStats();
          this.render();
          this.hideDeleteModal();
        }
      } catch (error) {
        console.error('Error deleting task:', error);
      }
    }
  }

  deleteTask(id) {
    this.showDeleteModal(id);
  }

  updateStats() {
    const total = this.tasks.length;
    const completed = this.tasks.filter(t => t.done).length;
    const pending = total - completed;

    document.getElementById('totalTasks').textContent = total;
    document.getElementById('completedTasks').textContent = completed;
    document.getElementById('pendingTasks').textContent = pending;
  }

  render() {
    const list = document.getElementById('taskList');
    const emptyState = document.getElementById('emptyState');
    const filteredTasks = this.getFilteredTasks();
    
    if (filteredTasks.length === 0) {
      list.classList.add('hidden');
      emptyState.classList.remove('hidden');
      return;
    }

    list.classList.remove('hidden');
    emptyState.classList.add('hidden');

    list.innerHTML = filteredTasks.map(task => {
      const isEditing = this.editingId === task.id;
      const isDone = task.done;

      return `
        <div class="task-item group bg-white/50 dark:bg-gray-700/50 backdrop-blur-sm rounded-lg p-2.5 border border-white/30 dark:border-gray-600/50 shadow-sm hover:shadow-md">
          <div class="flex items-start justify-between gap-2">
            <!-- Task Content -->
            <div class="flex-1 flex items-start gap-2 min-w-0">
              ${isEditing ? `
                <input 
                  id="edit-input-${task.id}" 
                  class="flex-1 px-2.5 py-1.5 rounded-md border-2 border-blue-200 dark:border-blue-500/50 bg-white dark:bg-gray-600 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 transition-all text-sm font-medium"
                  value="${task.text.replace(/"/g, '&quot;')}"
                  onkeypress="if(event.key==='Enter') taskApp.saveEdit(${task.id})"
                >
              ` : `
                <button 
                  onclick="taskApp.toggleTask(${task.id})"
                  class="flex-shrink-0 w-4 h-4 rounded-full border-2 flex items-center justify-center text-xs font-bold mt-0.5 transition-all duration-200 ${
                    isDone 
                      ? 'bg-green-500 text-white border-green-500 scale-105 shadow-sm' 
                      : 'bg-white dark:bg-gray-600 border-gray-300 dark:border-gray-500 hover:border-green-400 hover:bg-green-50 dark:hover:bg-green-900/20'
                  }"
                >
                  ${isDone ? '✓' : ''}
                </button>
                <span class="flex-1 pr-1 text-sm font-medium cursor-pointer select-none transition-all group-hover:pr-0 min-w-0 truncate ${
                  isDone ? 'line-through text-gray-500 dark:text-gray-400' : 'text-gray-900 dark:text-gray-100 hover:text-blue-600 dark:hover:text-blue-400'
                }" onclick="taskApp.toggleTask(${task.id})">${task.text}</span>
              `}
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-0.5 opacity-0 group-hover:opacity-100 transition-all duration-200 flex-shrink-0">
              ${isEditing ? `
                <button 
                  onclick="taskApp.saveEdit(${task.id})" 
                  class="p-1 text-green-500 hover:text-green-600 hover:bg-green-100 dark:hover:bg-green-900/30 rounded-md transition-all text-xs"
                  title="Lưu"
                >✓</button>
                <button 
                  onclick="taskApp.cancelEdit()" 
                  class="p-1 text-gray-400 hover:text-gray-600 hover:bg-gray-100 dark:hover:bg-gray-600/30 rounded-md transition-all text-xs"
                  title="Hủy"
                >✕</button>
              ` : `
                <button 
                  onclick="taskApp.startEdit(${task.id})" 
                  class="p-1 text-blue-500 hover:text-blue-600 hover:bg-blue-100 dark:hover:bg-blue-900/30 rounded-md transition-all text-xs"
                  title="Sửa"
                >✏️</button>
                <button 
                  onclick="taskApp.deleteTask(${task.id})" 
                  class="p-1 text-red-500 hover:text-red-600 hover:bg-red-100 dark:hover:bg-red-900/30 rounded-md transition-all text-xs"
                  title="Xóa"
                >🗑️</button>
              `}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }
}

const taskApp = new TaskForge();
  </script>
</body>
</html>
