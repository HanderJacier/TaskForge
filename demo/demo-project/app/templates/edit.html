<!doctype html>
<html lang="vi" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa | TaskFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Script này giúp trang Edit luôn cùng màu với trang Index -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
        })();
    </script>

    <style>
        body {
            background-color: var(--bs-tertiary-bg);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .edit-card {
            background-color: var(--bs-body-bg);
            padding: 2.5rem; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%; max-width: 450px;
            color: var(--bs-body-color);
        }
        .form-control, .form-select {
            background-color: var(--bs-secondary-bg);
            color: var(--bs-body-color);
            border: 1px solid var(--bs-border-color);
        }
    </style>
</head>
<body>
    <div class="edit-card">
        <h3 class="fw-bold mb-4">Chỉnh sửa công việc</h3>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">TÊN CÔNG VIỆC</label>
                <input class="form-control" name="name" value="{{ task[0] }}" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">TRẠNG THÁI</label>
                <select class="form-select" name="status">
                    <option value="pending" {% if task[1] == 'pending' %}selected{% endif %}>🟡 Đang chờ</option>
                    <option value="done" {% if task[1] == 'done' %}selected{% endif %}>🟢 Hoàn thành</option>
                </select>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                <a href="/" class="btn btn-link text-muted">Hủy bỏ</a>
            </div>
        </form>
    </div>
</body>
</html>
